// Snook 폼 (교육용 - PPT 값 직접 입력)
// ============================================================
function SnookForm({ inputs, update, result }) {
  const t = inputs.taskType;
  const g = inputs.gender;

  // PDF Original 기준: Push/Pull Hand Height는 남녀 모두 144/95/64
  const pushPullHeights = [{v:'64',l:'64 (낮음)'},{v:'95',l:'95 (중간)'},{v:'144',l:'144 (높음)'}];

  // PDF Original 기준: Carry Hand Height (남 79/111, 여 72/105)
  const carryHeights = g === 'male'
    ? [{v:'79',l:'79 cm (낮음)'},{v:'111',l:'111 cm (높음)'}]
    : [{v:'72',l:'72 cm (낮음)'},{v:'105',l:'105 cm (높음)'}];

  // Task Type 변경 시 기본값 자동 조정 (carry로 변경 시 carryHeight 검증)
  useEffect(() => {
    if (t === 'carry') {
      const validHeights = g === 'male' ? ['79', '111'] : ['72', '105'];
      if (!validHeights.includes(inputs.carryHeight)) {
        update('carryHeight', validHeights[1]);
      }
    }
  }, [t, g]);

  // Push/Pull: Distance 변경 시 빈도 자동 조정 (유효하지 않은 조합 방지)
  useEffect(() => {
    if (t !== 'push' && t !== 'pull') return;
    const distFreqs = {
      '2.1':  ['6s','12s','1min','2min','5min','30min','8h'],
      '7.6':  ['15s','22s','1min','2min','5min','30min','8h'],
      '15.2': ['25s','35s','1min','2min','5min','30min','8h'],
      '30.5': ['1min','2min','5min','30min','8h'],
      '45.7': ['1min','2min','5min','30min','8h'],
      '61.0': ['2min','5min','30min','8h'],
    };
    const valid = distFreqs[inputs.distance] || ['5min'];
    if (!valid.includes(inputs.frequency)) {
      update('frequency', valid[Math.min(2, valid.length - 1)]);
    }
  }, [t, inputs.distance]);

  // 올리기/Lower ↔ Push/Pull/Carry 전환 시 frequency 자동 보정
  useEffect(() => {
    if (t === 'lift' || t === 'lower') {
      const valid = ['5s','9s','14s','1min','2min','5min','30min','8h'];
      if (!valid.includes(inputs.frequency)) update('frequency', '5min');
    } else if (t === 'carry') {
      const valid = ['6s','12s','1min','2min','5min','30min','8h'];
      if (!valid.includes(inputs.frequency)) update('frequency', '5min');
    }
  }, [t]);

  return (
    <div className="section">
      <div className="section-header">
        <div className="section-number a" style={{ background: '#f59e0b' }}>S</div>
        <div className="section-title">Snook Table (자동조회)</div>
      </div>
      <div className="card">
        <div className="card-body">
          {/* 자동조회 안내 (Snook & Ciriello 1991 Original) */}
          <div className="info-banner" style={{ marginBottom: 12, background: '#dbeafe', borderColor: '#3b82f6', flexDirection: 'column', alignItems: 'flex-start' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6 }}>
              <span className="ico">⚡</span>
              <b style={{ fontSize: 12 }}>Snook Table Auto-lookup Mode (Snook & Ciriello 1991)</b>
            </div>
            <div style={{ fontSize: 11, lineHeight: 1.6, color: '#1e3a8a' }}>
              ① Select task type/conditions → ② Recommended value auto-shown → ③ Enter actual value → Auto assess
            </div>
            <div style={{ fontSize: 10, marginTop: 6, padding: 6, background: 'rgba(255,255,255,0.7)', borderRadius: 6, color: '#1e40af' }}>

function OptGroup({ label, angle, suggested, children }) {
  return (
    <div className="opt-group">
      <div className="opt-label">
        <span>{label}</span>
        {angle !== null && angle !== undefined && (
          <span className="measured">측정 {Math.round(angle)}°</span>
        )}
        {suggested && <span className="suggested">추천 {suggested}</span>}
      </div>
      {children}
    </div>
  );
}

function OptionRow({ value, onChange, options, suggested }) {
  return (
    <div className="opt-row">
      {options.map(opt => (
        <button
          key={opt.v}
          className={`opt-btn ${value === opt.v ? 'selected' : ''} ${suggested === opt.v && value !== opt.v ? 'suggested-hint' : ''}`}
          onClick={() => onChange(opt.v)}
        >
          {opt.l}<span className="opt-val">+{opt.v}</span>
        </button>
      ))}
    </div>
  );
}

function ModChip({ checked, onClick, label, delta }) {
  return (
    <button className={`mod-chip ${checked ? 'checked' : ''}`} onClick={onClick}>
      <span style={{ width: 12, height: 12, borderRadius: 3, border: '1.5px solid currentColor', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
        {checked && <span style={{ fontSize: 9, lineHeight: 1 }}>✓</span>}
      </span>
      {label}
      <span className="delta">{delta}</span>
    </button>
  );
}

function HistoryModal({ history, onClose, onLoad, onDelete }) {
  return (
    <div className="modal-backdrop fade-in" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <div style={{ fontSize: 11, color: '#94a3b8', fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.1em' }}>ASSESSMENT HISTORY</div>
            <h2 style={{ fontSize: 20, fontWeight: 700, marginTop: 2 }}>평가 History</h2>
          </div>
          <button className="btn-secondary" style={{ padding: 8 }} onClick={onClose}><Icon name="x" size={16} /></button>
        </div>
        <div className="modal-body">
          {history.length === 0 ? (
            <div style={{ textAlign: 'center', padding: 40, color: '#94a3b8' }}>
              <div style={{ fontSize: 36, marginBottom: 12, opacity: 0.4 }}>📋</div>
              <div style={{ fontSize: 14, fontWeight: 600, color: '#0f172a', marginBottom: 4 }}>No saved assessments</div>
              <div style={{ fontSize: 12 }}>After assessment, press "Save" to display</div>
            </div>
          ) : (
            history.map(rec => (
              <div key={rec.id} className="hist-item" onClick={() => onLoad(rec)}>
                <div className="hist-score" style={{ background: rec.result.color }}>{rec.result.finalScore}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: '#0f172a', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {rec.workerInfo.task || 'Records'}
                  </div>
                  <div style={{ fontSize: 12, color: '#64748b', marginTop: 2 }}>
                    {rec.workerInfo.name && `${rec.workerInfo.name} · `}Level {rec.result.level}
                  </div>
                  <div style={{ fontSize: 10, color: '#94a3b8', fontFamily: 'JetBrains Mono, monospace', marginTop: 3 }}>
                    {new Date(rec.createdAt).toLocaleString('ko-KR')}
                  </div>
                </div>
                <button className="btn-danger-ghost" onClick={(e)=>onDelete(rec.id, e)}>삭제</button>
              </div>
            ))
          )}
        </div>
      </div>
    </div>
  );
}

            <HazardItem label="과도한 힘(중량물)" checked={data.hazardWeight} onToggle={()=>toggle('hazardWeight')} desc={data.hazardWeightDesc} onDescChange={v=>update('hazardWeightDesc', v)} />
            <HazardItem label="과도한 힘(수공구)" checked={data.hazardTool} onToggle={()=>toggle('hazardTool')} desc={data.hazardToolDesc} onDescChange={v=>update('hazardToolDesc', v)} />
            <HazardItem label="Contact Stress" checked={data.hazardContact} onToggle={()=>toggle('hazardContact')} desc={data.hazardContactDesc} onDescChange={v=>update('hazardContactDesc', v)} />
            <HazardItem label="Vibration Tool" checked={data.hazardVibration} onToggle={()=>toggle('hazardVibration')} desc={data.hazardVibrationDesc} onDescChange={v=>update('hazardVibrationDesc', v)} />
            <HazardItem label="Repetitive Work" checked={data.hazardRepetition} onToggle={()=>toggle('hazardRepetition')} desc={data.hazardRepetitionDesc} onDescChange={v=>update('hazardRepetitionDesc', v)} />
            <HazardItem label="Other" checked={data.hazardOther} onToggle={()=>toggle('hazardOther')} desc={data.hazardOtherDesc} onDescChange={v=>update('hazardOtherDesc', v)} />
            <div style={{ marginTop: 8 }}>
              <div style={{ fontSize: 11, color: '#64748b', marginBottom: 4 }}>Additional Hazard Cause Description (Optional)</div>
              <textarea className="form-input" placeholder="작업 환경, 작업 방식 등에 대한 부가 설명" value={data.hazardCauseDesc} onChange={e=>update('hazardCauseDesc', e.target.value)} rows={2} style={{ resize: 'vertical' }} />
            </div>
          </ExcelSection>

          {/* RULA 자동 채움 안내 */}
          <div className="info-banner" style={{ marginTop: 12 }}>
            <span className="ico">✨</span>
            <div style={{ flex: 1 }}>
              <b>자동으로 채워질 항Neck (이미 평가 완료)</b><br/>
              <span style={{ fontSize: 11 }}>RULA Score {result.finalScore} (Level {result.level}) · {result.desc} · Upper Arm/Forearm/Wrist/Neck/Trunk/Legs Score 모두 포함</span>
            </div>
          </div>

          <div style={{ marginTop: 16, fontSize: 12, color: '#64748b', textAlign: 'center', padding: '10px 12px', background: '#f8fafc', borderRadius: 8 }}>
            <b>📋 다운로드 형식을 선택하세요</b><br/>
            <span style={{ fontSize: 11 }}>· Word (.docx) can be opened in Hangul Office</span>
          </div>
          <div style={{ marginTop: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
            <button className="btn-primary" style={{ width: '100%', background: 'linear-gradient(135deg, #10b981 0%, #059669 100%)', padding: '14px 18px' }} onClick={()=>onSubmit(data, 'excel')} disabled={generating}>
              {generating ? <><span style={{ display: 'inline-block', width: 14, height: 14, border: '2px solid rgba(255,255,255,0.3)', borderTopColor: 'white', borderRadius: '50%', animation: 'spin 0.8s linear infinite', marginRight: 6 }}></span> 생성 중...</> : <><Icon name="file" size={16} /> 엑cells(.xlsx)로 다운로드</>}
            </button>
            <button className="btn-primary" style={{ width: '100%', background: 'linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%)', padding: '14px 18px' }} onClick={()=>onSubmit(data, 'word')} disabled={generating}>
              {generating ? <><span style={{ display: 'inline-block', width: 14, height: 14, border: '2px solid rgba(255,255,255,0.3)', borderTopColor: 'white', borderRadius: '50%', animation: 'spin 0.8s linear infinite', marginRight: 6 }}></span> 생성 중...</> : <><Icon name="file" size={16} /> 한글/Word(.docx)로 다운로드</>}
            </button>
            <button className="btn-secondary" style={{ width: '100%', marginTop: 4 }} onClick={onClose} disabled={generating}>
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ExcelSection({ title, children }) {
  return (
    <div style={{ marginBottom: 16, padding: 14, background: '#f8fafc', borderRadius: 10, border: '1px solid #e2e8f0' }}>
      <div style={{ fontSize: 12, fontWeight: 700, color: '#0f172a', marginBottom: 10 }}>{title}</div>
      {children}
    </div>
  );
}

function ChangeRow({ label, value, onChange, dateValue, onDateChange, simple }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6, fontSize: 12 }}>
      <div style={{ width: 80, color: '#475569', fontWeight: 600 }}>{label}</div>
      <div style={{ display: 'flex', gap: 6, flex: 1 }}>
        {(simple ? [
          { v: 'none', l: 'No Change' },
          { v: 'changed', l: 'Change Present' },
        ] : [
          { v: 'none', l: 'No Change' },
          { v: 'decreased', l: '줄음' },
          { v: 'increased', l: '늘어남' },
          { v: 'other', l: 'Other' },
        ]).map(o => (
          <button key={o.v} className={`opt-btn ${value === o.v ? 'selected' : ''}`} style={{ padding: '5px 8px', fontSize: 11 }} onClick={()=>onChange(o.v)}>
            {o.l}
          </button>
        ))}
      </div>
      {value !== 'none' && (
        <input type="text" placeholder="언제부터 (예: 2023년 04월)" value={dateValue} onChange={e=>onDateChange(e.target.value)} style={{ width: 140, padding: '5px 8px', border: '1px solid #e2e8f0', borderRadius: 6, fontSize: 11 }} />
      )}
    </div>
  );
}

function HazardItem({ label, checked, onToggle, desc, onDescChange }) {
  return (
    <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 6 }}>
      <label className={`mod-chip ${checked ? 'checked' : ''}`} style={{ minWidth: 140, fontSize: 12 }}>
        <input type="checkbox" checked={checked} onChange={onToggle} style={{ display: 'none' }} />
        <span style={{ width: 12, height: 12, borderRadius: 3, border: '1.5px solid currentColor', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
          {checked && <span style={{ fontSize: 9, lineHeight: 1 }}>✓</span>}
        </span>
        {label}
      </label>
      {onDescChange !== undefined && (
        <input type="text" placeholder={checked ? '원인 설명' : '(Enter if checked)'} value={desc || ''} onChange={e=>onDescChange(e.target.value)} disabled={!checked} style={{ flex: 1, padding: '6px 10px', border: '1px solid #e2e8f0', borderRadius: 6, fontSize: 12, background: checked ? 'white' : '#f8fafc' }} />
      )}
    </div>
  );
}

// ============================================================
// 엑cells 보고서 생성 (양식: Hazard Factor Basic Investigation)
// ============================================================
async function generateExcelReport({ workerInfo, inputs, result, photo, joints, angles, extra, tool }) {
  tool = tool || 'RULA';  // 기본값
  if (typeof ExcelJS === 'undefined') {
    throw new Error('ExcelJS 라이브러리가 로드되지 않았습니다.');
  }

  const wb = new ExcelJS.Workbook();
  wb.creator = 'ErgoAssess Pro';
  wb.created = new Date();

  const ws = wb.addWorksheet('Hazard Factor Basic Investigation', {
    pageSetup: { paperSize: 9, orientation: 'portrait', fitToPage: true, fitToWidth: 1, fitToHeight: 0, margins: { left: 0.984, right: 0.866, top: 0.787, bottom: 0.591, header: 0.3, footer: 0.3 } },
  });

  // 컬럼 Width (총 13개 컬럼 활용)
  const colWidths = [3, 12, 10, 4, 4, 12, 10, 10, 4, 12, 10, 10, 6];
  colWidths.forEach((w, i) => { ws.getColumn(i + 1).width = w; });

  // 기본 폰트/스타일
  const font = { name: '맑은 고딕', size: 10 };
  const fontBold = { ...font, bold: true };
  const fontTitle = { ...font, size: 16, bold: true };
  const fontSection = { ...font, size: 11, bold: true };

  const border = {
    top: { style: 'thin', color: { argb: 'FF000000' } },
    left: { style: 'thin', color: { argb: 'FF000000' } },
    bottom: { style: 'thin', color: { argb: 'FF000000' } },
    right: { style: 'thin', color: { argb: 'FF000000' } },
  };
  const alignCenter = { vertical: 'middle', horizontal: 'center', wrapText: true };
  const alignLeft = { vertical: 'middle', horizontal: 'left', wrapText: true, indent: 1 };
  const fillGray = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE0E0E0' } };
  const fillLightGray = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF2F2F2' } };
  const fillYellow = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF4CC' } };

  // cells에 스타일 적용 헬퍼
  const setCell = (addr, value, opts = {}) => {
    const cell = ws.getCell(addr);
    cell.value = value;
    cell.font = opts.font || font;
    cell.alignment = opts.alignment || alignCenter;
    cell.border = opts.border !== false ? border : undefined;
    if (opts.fill) cell.fill = opts.fill;
    return cell;
  };
  const setRangeStyle = (range, opts) => {
    const [start, end] = range.split(':');
    ws.mergeCells(range);
    setCell(start, opts.value, opts);
  };

  // ============ 1. 제Neck ============
  let row = 1;
  ws.getRow(row).height = 28;
  setRangeStyle(`A${row}:M${row}`, { value: 'Hazard Factor Basic Investigation', font: fontTitle, alignment: alignCenter, fill: fillGray });
  row++;

  // ============ 2. Investigation Type ============
  ws.getRow(row).height = 18;
  setRangeStyle(`A${row}:B${row + 2}`, { value: 'Investigation Type', font: fontBold, fill: fillLightGray });
  setRangeStyle(`C${row}:M${row}`, {
    value: extra.investigationType === 'periodic' ? '■ Periodic Investigation' : '□ Periodic Investigation',
    font, alignment: alignLeft,
  });
  row++;
  ws.getRow(row).height = 18;
  setRangeStyle(`C${row}:M${row}`, {
    value: extra.investigationType === 'occasional' ? '■ Occasional Investigation' : '□ Occasional Investigation',
    font, alignment: alignLeft,
  });
  row++;
  ws.getRow(row).height = 36;
  const occReasons = [
    { v: 'disease', l: 'Musculoskeletal 질환자 발생 시' },
    { v: 'new_work', l: '새로운 작업·설비 도입 시' },
    { v: 'env_change', l: '업무의 양·작업환경 변경 시' },
  ];
  const occText = occReasons.map(o =>
    `${extra.investigationType === 'occasional' && extra.occasionalReason === o.v ? '■' : '□'} ${o.l}`
  ).join('\n');
  setRangeStyle(`C${row}:M${row}`, { value: occText, font, alignment: { vertical: 'middle', horizontal: 'left', wrapText: true, indent: 2 } });
  row++;

  // ============ 3. 조사일시 / Investigator ============
  ws.getRow(row).height = 22;
  setRangeStyle(`A${row}:B${row}`, { value: '조사일시', font: fontBold, fill: fillLightGray });
  setRangeStyle(`C${row}:G${row}`, { value: workerInfo.date || '', font, alignment: alignLeft });
  setRangeStyle(`H${row}:I${row}`, { value: '조 사 자', font: fontBold, fill: fillLightGray });
  setRangeStyle(`J${row}:M${row}`, { value: extra.investigator || '', font, alignment: alignLeft });
  row++;

  // ============ 4. Department / Process No. ============
  ws.getRow(row).height = 22;
  setRangeStyle(`A${row}:B${row}`, { value: '부 서 명', font: fontBold, fill: fillLightGray });
  setRangeStyle(`C${row}:I${row}`, { value: extra.department || '', font, alignment: alignLeft });
  setRangeStyle(`J${row}:J${row}`, { value: 'Process No.', font: fontBold, fill: fillLightGray });
  setRangeStyle(`K${row}:M${row}`, { value: extra.processNumber || '', font, alignment: alignLeft });
  row++;

  // ============ 5. 작업Process Name ============
  ws.getRow(row).height = 22;
  setRangeStyle(`A${row}:B${row}`, { value: '작업Process Name', font: fontBold, fill: fillLightGray });
  setRangeStyle(`C${row}:M${row}`, { value: extra.processName || '', font, alignment: alignLeft });
  row++;

  // ============ 6. Task Name ============
  ws.getRow(row).height = 22;
  setRangeStyle(`A${row}:B${row}`, { value: '작 업 명', font: fontBold, fill: fillLightGray });
  setRangeStyle(`C${row}:M${row}`, { value: extra.workName || '', font, alignment: alignLeft });
  row++;

  // ============ 가. Workplace Situation Survey ============
  ws.getRow(row).height = 22;
  setRangeStyle(`A${row}:M${row}`, { value: '가. Workplace Situation Survey', font: fontSection, alignment: alignLeft, fill: fillGray });
  row++;

  const changeRows = [
    {
      label: '작 업 설 비',
      val: extra.equipChange,
      date: extra.equipChangeDate,
      options: [
        { v: 'none', l: 'No Change' },
        { v: 'changed', l: 'Change Present' },
      ],
    },
    {
      label: '작 업 량',
      val: extra.workloadChange,
      date: extra.workloadChangeDate,
      options: [
        { v: 'none', l: 'No Change' },
        { v: 'decreased', l: '줄음' },
        { v: 'increased', l: '늘어남' },
        { v: 'other', l: 'Other' },
      ],
    },
    {
      label: '작 업 속 도',
      val: extra.speedChange,
      date: extra.speedChangeDate,
      options: [
        { v: 'none', l: 'No Change' },
        { v: 'decreased', l: '줄음' },
        { v: 'increased', l: '늘어남' },
        { v: 'other', l: 'Other' },
      ],
    },
    {
      label: '업 무 변 화',
      val: extra.taskChange,
      date: extra.taskChangeDate,
      options: [
        { v: 'none', l: 'No Change' },
        { v: 'decreased', l: '줄음' },
        { v: 'increased', l: '늘어남' },
        { v: 'other', l: 'Other' },
      ],
    },
  ];

  changeRows.forEach(cr => {
    const startRow = row;
    const lines = cr.options.length;
    ws.getRow(row).height = 18;
    setRangeStyle(`A${row}:B${row + lines - 1}`, { value: cr.label, font: fontBold, fill: fillLightGray });
    cr.options.forEach((opt, i) => {
      const r = startRow + i;
      ws.getRow(r).height = 18;
      const isSelected = cr.val === opt.v;
      let text = `${isSelected ? '■' : '□'} ${opt.l}`;
      if (isSelected && opt.v !== 'none' && cr.date) {
        text += ` (언제부터: ${cr.date})`;
      } else if (opt.v !== 'none' && opt.l !== 'Change Present') {
        text += ' (언제부터       )';
      } else if (opt.v === 'changed') {
        text += ' (언제부터       )';
      }
      setRangeStyle(`C${r}:M${r}`, { value: text, font, alignment: alignLeft });
    });
    row += lines;
  });

  // ============ 나. Work Conditions Survey ============
  ws.getRow(row).height = 22;
  setRangeStyle(`A${row}:M${row}`, { value: '나. Work Conditions Survey', font: fontSection, alignment: alignLeft, fill: fillGray });
  row++;

  // Workload/빈도 매트릭스 헤더
  ws.getRow(row).height = 20;
  setRangeStyle(`A${row}:M${row}`, { value: '각 작업별 Workload 및 Frequency (Worker interview)', font: fontBold, alignment: alignLeft, fill: fillLightGray });
  row++;

  // 부하 / 빈도 표
  ws.getRow(row).height = 20;
  setRangeStyle(`A${row}:C${row}`, { value: 'Workload (A)', font: fontBold, fill: fillLightGray });
  setRangeStyle(`D${row}:E${row}`, { value: 'Score', font: fontBold, fill: fillLightGray });
  setRangeStyle(`F${row}:I${row}`, { value: 'Frequency (B)', font: fontBold, fill: fillLightGray });
  setRangeStyle(`J${row}:M${row}`, { value: 'Score', font: fontBold, fill: fillLightGray });
  row++;

  const workloadLabels = [
    ['Very Easy', 1, 'Very rare (1-2/2months)', 1],
    ['Easy', 2, 'Sometimes (하루 또는 주 2~3일)', 2],
    ['Somewhat Hard', 3, 'Often (1일 4시간)', 3],
    ['Hard', 4, 'Continuously (1일 4시간 이상)', 4],
    ['Very Hard', 5, 'Overtime 시간 (1일 8시간 이상)', 5],
  ];

  workloadLabels.forEach(([wl, ws_, fl, fs]) => {
    ws.getRow(row).height = 18;
    const wlHighlight = extra.workloadScore === ws_;
    const fsHighlight = extra.frequencyScore === fs;
    setRangeStyle(`A${row}:C${row}`, { value: wl, font: wlHighlight ? fontBold : font, alignment: alignCenter, fill: wlHighlight ? fillYellow : null });
    setRangeStyle(`D${row}:E${row}`, { value: ws_, font: wlHighlight ? fontBold : font, alignment: alignCenter, fill: wlHighlight ? fillYellow : null });
    setRangeStyle(`F${row}:I${row}`, { value: fl, font: fsHighlight ? fontBold : font, alignment: alignCenter, fill: fsHighlight ? fillYellow : null });
    setRangeStyle(`J${row}:M${row}`, { value: fs, font: fsHighlight ? fontBold : font, alignment: alignCenter, fill: fsHighlight ? fillYellow : null });
    row++;
  });

  // Score 합산 행
  ws.getRow(row).height = 22;
  setRangeStyle(`A${row}:C${row}`, { value: 'Task Name', font: fontBold, fill: fillLightGray });
  setRangeStyle(`D${row}:F${row}`, { value: '작업 부하 (A)', font: fontBold, fill: fillLightGray });
  setRangeStyle(`G${row}:I${row}`, { value: '작업 빈도 (B)', font: fontBold, fill: fillLightGray });
  setRangeStyle(`J${row}:M${row}`, { value: 'Total Score수 (A × B)', font: fontBold, fill: fillLightGray });
  row++;
  ws.getRow(row).height = 24;
  setRangeStyle(`A${row}:C${row}`, { value: extra.workName || '', font, alignment: alignCenter });
  setRangeStyle(`D${row}:F${row}`, { value: extra.workloadScore, font: fontBold, alignment: alignCenter });
  setRangeStyle(`G${row}:I${row}`, { value: extra.frequencyScore, font: fontBold, alignment: alignCenter });
  setRangeStyle(`J${row}:M${row}`, { value: extra.workloadScore * extra.frequencyScore, font: fontBold, alignment: alignCenter, fill: fillYellow });
  row++;

  // ============ 다. Hazard Factor 및 원인 평가서 ============
  ws.getRow(row).height = 22;
  setRangeStyle(`A${row}:M${row}`, { value: '다. Hazard Factor 및 원인 평가서', font: fontSection, alignment: alignLeft, fill: fillGray });
  row++;

  ws.getRow(row).height = 22;
  setRangeStyle(`A${row}:E${row}`, { value: 'MSD Burden Work', font: fontBold, fill: fillLightGray });
  setRangeStyle(`F${row}:M${row}`, { value: extra.burdenWorkNumber || 'None', font, alignment: alignLeft });
  row++;

  // 사진 영역 (Joints marked된 사진 삽입)
  if (photo) {
    const photoStartRow = row;
    const photoRows = 16;
    for (let i = 0; i < photoRows; i++) {
      ws.getRow(row + i).height = 18;
    }
    // 사진 영역 박스
    for (let r = photoStartRow; r < photoStartRow + photoRows; r++) {
      for (let c = 1; c <= 13; c++) {
        const cell = ws.getCell(r, c);
        cell.border = border;
      }
    }
    try {
      const base64Data = photo.split(',')[1];
      const extMatch = photo.match(/data:image\/(\w+);/);
      const ext = extMatch ? extMatch[1] : 'jpeg';
      const imgId = wb.addImage({
        base64: base64Data,
        extension: ext === 'jpg' ? 'jpeg' : ext,
      });
      ws.addImage(imgId, {
        tl: { col: 1, row: photoStartRow - 1 },
        br: { col: 12, row: photoStartRow + photoRows - 1 },
        editAs: 'oneCell',
      });
    } catch (e) {
      console.error('이미지 삽입 실패:', e);
    }
    row += photoRows;
  } else {
    ws.getRow(row).height = 200;
    setRangeStyle(`A${row}:M${row}`, { value: '(사진 None)', font, alignment: alignCenter });
    row++;
  }

  // ============ 작업별로 관찰된 Hazard Cause Analysis ============
  ws.getRow(row).height = 22;
  setRangeStyle(`A${row}:M${row}`, { value: '작업별로 관찰된 Hazard Cause Analysis', font: fontSection, alignment: alignLeft, fill: fillGray });
  row++;

  ws.getRow(row).height = 22;
  setRangeStyle(`A${row}:C${row}`, { value: 'Task Name', font: fontBold, fill: fillLightGray });
  setRangeStyle(`D${row}:M${row}`, { value: extra.workName || '', font, alignment: alignLeft });
  row++;

  // Hazard Factor 표 헤더
  ws.getRow(row).height = 20;
  setRangeStyle(`A${row}:C${row}`, { value: 'Hazard Factor', font: fontBold, fill: fillLightGray });
  setRangeStyle(`D${row}:E${row}`, { value: '체크', font: fontBold, fill: fillLightGray });
  setRangeStyle(`F${row}:L${row}`, { value: 'Hazard Factor에 대한 원인', font: fontBold, fill: fillLightGray });
  setRangeStyle(`M${row}:M${row}`, { value: 'Total Score수', font: fontBold, fill: fillLightGray });
  row++;

  const hazardItems = [
    { label: 'Awkward Posture', checked: extra.hazardPosture, desc: '' },
    { label: 'Excessive Force (Heavy Object) 필요작업', checked: extra.hazardWeight, desc: extra.hazardWeightDesc },
    { label: 'Excessive Force (Tool) 필요작업', checked: extra.hazardTool, desc: extra.hazardToolDesc },
    { label: 'Contact Stress 작업', checked: extra.hazardContact, desc: extra.hazardContactDesc },
    { label: 'Vibration Tool 작업', checked: extra.hazardVibration, desc: extra.hazardVibrationDesc },
    { label: 'Repetitive Work', checked: extra.hazardRepetition, desc: extra.hazardRepetitionDesc },
    { label: 'Other', checked: extra.hazardOther, desc: extra.hazardOtherDesc },
  ];

  hazardItems.forEach((h, i) => {
    ws.getRow(row).height = 24;
    setRangeStyle(`A${row}:C${row}`, { value: h.label, font: h.checked ? fontBold : font, alignment: alignLeft });
    setRangeStyle(`D${row}:E${row}`, { value: h.checked ? '( ○ )' : '(    )', font: h.checked ? fontBold : font, alignment: alignCenter, fill: h.checked ? fillYellow : null });
    setRangeStyle(`F${row}:L${row}`, { value: h.desc || '', font, alignment: alignLeft });
    if (i === 0) {
      // Awkward Posture 행에 RULA Total Score 표시 (영구합쳐서)
      setRangeStyle(`M${row}:M${row + hazardItems.length - 1}`, { value: result.finalScore, font: { ...fontBold, size: 14 }, alignment: alignCenter, fill: fillYellow });
    }
    row++;
  });

  // 추가 원인 설명
  if (extra.hazardCauseDesc) {
    ws.getRow(row).height = 30;
    setRangeStyle(`A${row}:C${row}`, { value: '추가 설명', font: fontBold, fill: fillLightGray });
    setRangeStyle(`D${row}:M${row}`, { value: extra.hazardCauseDesc, font, alignment: alignLeft });
    row++;
  }

  footerCell.font = { ...font, size: 8, italic: true, color: { argb: 'FF666666' } };

  // 인쇄 영역 설정

  // 파일 다운로드

// ============================================================
// 한글/Word 보고서 생성 (양식: Hazard Factor Basic Investigation)
// ============================================================
// 🆕 Integrated Word 보고서 생성: 한 사진에 대해 여러 Tool 결과를 한 파일로
// 안 A: 사진별로 페이지 분리 (이 함수는 단일 사진 기준 처리)
// ============================================================
// ============================================================
// 🆕 Integrated Word 보고서 (v1.6 Hazard Factor기본조사표 양식 기반)
// 각 Tool별로 generateWordReport를 호출하여 children만 받고
// 페이지 break로 연결하여 한 파일로 출력
// ============================================================
async function generateIntegratedWordReport({ workerInfo, photo, joints, angles, toolResults, filenameInfo, extra }) {
  const docxLib = (typeof docx !== 'undefined' && docx) || (typeof window !== 'undefined' && window.docx) || null;
  if (!docxLib) throw new Error('docx 라이브러리가 로드되지 않았습니다.');
  const {
    Document, Packer, Paragraph, TextRun, AlignmentType, BorderStyle,
    ShadingType, PageOrientation,
  } = docxLib;

  const FONT = '맑은 고딕';
  const PT = (n) => n * 2;

  // 각 Tool별로 generateWordReport를 호출하여 children 받기
  const allChildren = [];
  let lastFONT = FONT;

  for (let i = 0; i < toolResults.length; i++) {
    const { tool, inputs, result } = toolResults[i];

    // 첫 Tool가 아니면 페이지 분리
    if (i > 0) {
      allChildren.push(new Paragraph({
        children: [new TextRun({ text: '', font: lastFONT })],
        pageBreakBefore: true,
      }));
    }

    // 기존 함수를 호출하여 children만 받기
    const sectionResult = await generateWordReport({
      workerInfo,
      inputs,
      result,
      photo,
      joints,
      angles,
      extra: extra || {},
      tool,
      _returnChildrenOnly: true,
    });

    if (sectionResult && sectionResult.children) {
      allChildren.push(...sectionResult.children);
      lastFONT = sectionResult.FONT || FONT;
    }
  }

  // 한 Document로 합쳐서 생성
  const doc = new Document({

  const docxLib = (typeof docx !== 'undefined' && docx) || (typeof window !== 'undefined' && window.docx) || null;
  if (!docxLib) {
    throw new Error('docx 라이브러리가 로드되지 않았습니다. 페이지를 새로고침해보세요.');

    Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    ImageRun, AlignmentType, WidthType, BorderStyle, HeightRule,
    PageOrientation, ShadingType, VerticalAlign, HeadingLevel,
  } = docxLib;

  // 기본 폰트 및 스타일
  const FONT = '맑은 고딕';
  const PT = (n) => n * 2; // docx는 half-point 단위

  // 헬퍼: TextRun 생성
  const tr = (text, opts = {}) => new TextRun({
    text: String(text ?? ''),
    font: FONT,
    size: opts.size ?? PT(10),
    bold: opts.bold ?? false,
    color: opts.color ?? '000000',
    break: opts.break,
  });

  // 헬퍼: Paragraph 생성
  const p = (text, opts = {}) => new Paragraph({
    alignment: opts.align ?? AlignmentType.LEFT,
    spacing: { before: 0, after: 0, line: 280 },
    children: Array.isArray(text) ? text : [tr(text, opts)],
  });

  // 헬퍼: TableCell 생성

    top: { style: BorderStyle.SINGLE, size: 4, color: '000000' },

    left: { style: BorderStyle.SINGLE, size: 4, color: '000000' },
    right: { style: BorderStyle.SINGLE, size: 4, color: '000000' },
  };

  const cell = (content, opts = {}) => {
    const children = Array.isArray(content)
      ? content
      : [typeof content === 'string' || typeof content === 'number'
          ? p(String(content), { align: opts.align, bold: opts.bold, size: opts.size })
          : content];
    return new TableCell({
      children,
      width: opts.width ? { size: opts.width, type: WidthType.DXA } : undefined,
      columnSpan: opts.colSpan,
      rowSpan: opts.rowSpan,

function shade(color, percent) {
  const c = color.replace('#','');
  const num = parseInt(c, 16);
  const r = Math.max(0, Math.min(255, ((num >> 16) & 0xff) + percent*2.55));
  const g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + percent*2.55));
  const b = Math.max(0, Math.min(255, (num & 0xff) + percent*2.55));
  return '#' + [r,g,b].map(x => Math.round(x).toString(16).padStart(2,'0')).join('');
}

// ============================================================
// 🔒 얼굴 마스크 처리 (개인정보 보호)
// 관절점의 head 위치를 기반으로 얼굴 영역을 픽cells화 + 가림
// 별도 함수로 분리하여 관절점 유무와 무관하게 사용 가능
// ============================================================
function applyFaceMask(ctx, canvas, joints, W, H) {
  if (!joints || !joints.head) return;
  const fx = joints.head.x * W;
  const fy = joints.head.y * H;
  // 얼굴 반경 계산 (축소: 어깨까지 안 가도록)
  let radius;
  if (joints.neck) {
    const nx = joints.neck.x * W;
    const ny = joints.neck.y * H;
    const headNeckDist = Math.sqrt((fx - nx) ** 2 + (fy - ny) ** 2);
    // 1.3 → 0.75로 축소 (얼굴만 가리도록)
    radius = Math.max(headNeckDist * 0.75, Math.min(W, H) * 0.035);
    // 상한선 추가: 머리-Neck Distance의 1배를 넘지 않음
    radius = Math.min(radius, headNeckDist * 0.95);
  } else {
    // 폴백: 사진 크기의 4.5% (기존 9% → 절반)
    radius = Math.min(W, H) * 0.045;
  }
  // head 중심 보정(Fair head 키포인트가 정수리/이마)
  let cx = fx, cy = fy;
  if (joints.neck) {
    const nx = joints.neck.x * W;
    const ny = joints.neck.y * H;
    const dx = fx - nx;
    const dy = fy - ny;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    // 0.15 → 0.05로 (보정 거의 안 함)
    cx = fx + (dx / len) * (radius * 0.05);
    cy = fy + (dy / len) * (radius * 0.05);
  }

  // 1단계: 픽cells화 (모자이크)
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.clip();
  const pixSize = Math.max(6, Math.round(radius / 8));
  const smallW = Math.max(4, Math.round((radius * 2) / pixSize));
  const smallCanvas = document.createElement('canvas');
  smallCanvas.width = smallW;
  smallCanvas.height = smallW;
  const sctx = smallCanvas.getContext('2d');
  sctx.imageSmoothingEnabled = false;
  sctx.drawImage(canvas, cx - radius, cy - radius, radius * 2, radius * 2, 0, 0, smallW, smallW);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(smallCanvas, 0, 0, smallW, smallW, cx - radius, cy - radius, radius * 2, radius * 2);
  ctx.imageSmoothingEnabled = true;
  ctx.restore();

  // 2단계: 반투명 어두운 원으로 추가 가림 (살짝만 — 사진이 잘 보이도록)
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(30, 41, 59, 0.45)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(15, 23, 42, 0.6)';
  ctx.lineWidth = Math.max(1.5, W / 800);
  ctx.stroke();
  ctx.restore();

  // 3단계: 자물쇠 아이콘 (작게)
  const iconSize = Math.max(10, radius * 0.4);
  ctx.save();
  ctx.font = `${iconSize}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
  ctx.fillText('🔒', cx, cy);
  ctx.restore();
}

// 관절점이 없거나 head 키포인트가 없을 때 사진에서 얼굴 영역을 추정해 마스킹
// (간단한 휴리스틱: 사진 상단 1/4 영역 가운데를 가림 — 보수적 가정)
function applyConservativeFaceMask(ctx, W, H) {
  // 상단 30% 중앙에 얼굴이 있다고 가정 (실제로는 추정일 뿐 알림)
  const cx = W / 2;
  const cy = H * 0.15;
  const radius = Math.min(W, H) * 0.06;  // 12% → 6% (얼굴만)
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(30, 41, 59, 0.85)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(15, 23, 42, 0.9)';
  ctx.lineWidth = 3;
  ctx.stroke();
  // 안내 텍스트
  ctx.font = `${Math.max(12, radius * 0.25)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
  ctx.fillText('🔒', cx, cy);
  ctx.restore();
}

// 사진 단독 마스킹 (관절점 없을 때 보고서용)
function generateMaskedPhoto(photoSrc, joints) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        const maxDim = 4000;  // 보고서 선명도 최대화
        let W = img.width;
        let H = img.height;
        if (W > maxDim || H > maxDim) {
          const scale = maxDim / Math.max(W, H);
          W = Math.round(W * scale);
          H = Math.round(H * scale);
        }
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, W, H);
        // 얼굴 마스킹
        if (joints && joints.head) {
          applyFaceMask(ctx, canvas, joints, W, H);
        } else {
          applyConservativeFaceMask(ctx, W, H);
        }
        resolve(canvas.toDataURL('image/jpeg', 0.98));
      } catch (e) {
        reject(e);
      }
    };
    img.onerror = reject;
    img.src = photoSrc;
  });
}

function generateAnnotatedImage(photoSrc, joints, angles) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        // Original 해상도 유지하되 너무 크면 다운스케일
        const maxDim = 4000;  // 보고서 선명도 최대화
        let W = img.width;
        let H = img.height;
        if (W > maxDim || H > maxDim) {
          const scale = maxDim / Math.max(W, H);
          W = Math.round(W * scale);
          H = Math.round(H * scale);
        }
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext('2d');

        // Original 사진
        ctx.drawImage(img, 0, 0, W, H);

        // 🔒 개인정보 보호: 얼굴 자동 모자이크 (스켈레톤 그리기 전)
        applyFaceMask(ctx, canvas, joints, W, H);

        // 약간 어둡게 (선이 잘 보이게)
        ctx.fillStyle = 'rgba(0,0,0,0.08)';  // 더 밝게 (선명도 향상)
        ctx.fillRect(0, 0, W, H);

        // 스켈레톤 선 (외곽선 + 본선)
        SKELETON_LINES.forEach(([a, b]) => {
          if (joints[a] && joints[b]) {
            const pa = { x: joints[a].x * W, y: joints[a].y * H };
            const pb = { x: joints[b].x * W, y: joints[b].y * H };
            ctx.strokeStyle = 'rgba(0,0,0,0.6)';
            ctx.lineWidth = Math.max(5, W / 233);  // 1.5배
            ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y); ctx.stroke();
            ctx.strokeStyle = '#fbbf24';
            ctx.lineWidth = Math.max(2.5, W / 400);  // 1.5배
            ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y); ctx.stroke();
          }
        });

        // 관절 점만 표시 (라벨/각도호/각도박스 제거)
        const ptRadius = Math.max(4, W / 333);  // 1.2배 크게
        const ringRadius = ptRadius + Math.max(1, ptRadius * 0.3);  // 외곽 비례 축소
        JOINTS.forEach(j => {
          const p = joints[j.key];
          if (!p) return;
          const x = p.x * W;
          const y = p.y * H;
          // 외곽 그림자
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.beginPath(); ctx.arc(x, y, ringRadius, 0, Math.PI*2); ctx.fill();
          // 본체
          ctx.fillStyle = j.color;
          ctx.strokeStyle = 'white';
          ctx.lineWidth = Math.max(1, W / 1200);  // 테두리도 가늘게
          ctx.beginPath(); ctx.arc(x, y, ptRadius, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        });

        resolve(canvas.toDataURL('image/jpeg', 0.98));
      } catch (e) {
        reject(e);
      }
    };
    img.onerror = reject;
    img.src = photoSrc;
  });
}
